services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: subledger
      POSTGRES_PASSWORD: subledger
      POSTGRES_DB: subledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subledger -d subledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      APP_NAME: SubLedger
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://subledger:subledger@db:5432/subledger
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
